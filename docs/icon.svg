<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#fbf1c7"/>

  <!-- Newspaper body -->
  <rect x="26" y="18" width="64" height="82" rx="5" fill="none" stroke="#c88010" stroke-width="3.5"/>

  <!-- Headline bar -->
  <rect x="36" y="28" width="44" height="7" rx="2" fill="#c88010"/>

  <!-- Text lines -->
  <line x1="36" y1="46" x2="80" y2="46" stroke="#7c6f64" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="55" x2="72" y2="55" stroke="#7c6f64" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="64" x2="80" y2="64" stroke="#7c6f64" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="73" x2="68" y2="73" stroke="#7c6f64" stroke-width="3" stroke-linecap="round"/>

  <!-- Subscribe circle (bottom-right, overlapping) -->
  <circle cx="84" cy="90" r="18" fill="#c88010"/>
  <line x1="78" y1="90" x2="90" y2="90" stroke="#fbf1c7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="84" y1="84" x2="84" y2="96" stroke="#fbf1c7" stroke-width="2.5" stroke-linecap="round"/>
</svg>
